site_name: Awesome AI Discoveries
site_url: https://alandevc8763.github.io/awesome-ai-discoveries/
theme:
  name: material
  palette: 
    - scheme: default 
      primary: indigo 
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 繁體中文
          build: true

nav:
  - Home: index.md
  - Curated Resources: resources.md
