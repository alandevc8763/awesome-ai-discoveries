site_name: Awesome AI Discoveries
site_url: https://alandevc8763.github.io/awesome-ai-discoveries/
theme:
  name: material
  palette: 
    - scheme: default 
      primary: indigo 
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 繁體中文
          build: true

nav:
  - Home: index.md
  - Curated Resources:
      - Overview: resources/index.md
      - Core Models: resources/core-models.md
      - Agent Frameworks: resources/agent-frameworks.md
      - Inference & Training: resources/inference-training.md
      - Data & RAG: resources/data-rag.md
      - Infrastructure: resources/infrastructure.md
      - Research Papers: resources/research-papers.md
